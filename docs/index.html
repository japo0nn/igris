<!DOCTYPE html>
<html>

<head>
    <title>IGRIS</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding: 80px
        }

        h1 {
            font-size: 4rem
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 24px;
            margin: 10px;
            display: inline-block;
            width: 280px;
            text-align: left
        }

        .card h3 {
            font-size: 1.1rem
        }

        .card p {
            color: #888;
            font-size: .85rem
        }

        .btn {
            background: #fff;
            color: #000;
            padding: 12px 28px;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px
        }

        @media(max-width:768px) {
            h1 {
                font-size: 2.5rem
            }
        }
    </style>
</head>

<body>
    <h1>Intelligent General<br>Runtime & Integrated System</h1>
    <p style=color:#888>Your open-source personal PC assistant</p>
    <div>
        <div class=card>
            <h3>🧠 Memory</h3>
            <p>Persistent context across sessions</p>
        </div>
        <div class=card>
            <h3>🌐 Search</h3>
            <p>Web & file natural language search</p>
        </div>
        <div class=card>
            <h3>🖱 GUI</h3>
            <p>Mouse, keyboard, screenshot automation</p>
        </div>
    </div><a href=https://github.com/japo0nn/igris class=btn>Get Started</a>
    <p style=color:#555;margin-top:40px;font-size:.8rem>© 2026 japo0nn — MIT</p>
</body>

</html>
