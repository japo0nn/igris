name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true

jobs:
  check-branch:
    name: Check branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on main
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          MAIN_COMMIT=$(git rev-list -n 1 origin/main 2>/dev/null || echo "")
          if [ "$TAG_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "Tag ${{ github.ref_name }} is not on main branch. Releases allowed only from main."
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} is on main ✓"

  build:
    name: Build ${{ matrix.target }}
    needs: check-branch
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/igris${{ matrix.suffix }} dist/igris-${{ matrix.target }}${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: igris-${{ matrix.target }}
          path: dist/igris-${{ matrix.target }}${{ matrix.suffix }}
          if-no-files-found: error

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create checksums
        run: |
          cd dist
          for f in igris-*; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: IGRIS ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## IGRIS ${{ github.ref_name }}

            ### Download
            - [Linux x86_64](https://github.com/japo0nn/igris/releases/download/${{ github.ref_name }}/igris-x86_64-unknown-linux-gnu)
            - [macOS Intel](https://github.com/japo0nn/igris/releases/download/${{ github.ref_name }}/igris-x86_64-apple-darwin)
            - [macOS Apple Silicon](https://github.com/japo0nn/igris/releases/download/${{ github.ref_name }}/igris-aarch64-apple-darwin)
            - [Windows x86_64](https://github.com/japo0nn/igris/releases/download/${{ github.ref_name }}/igris-x86_64-pc-windows-msvc.exe)
          files: dist/*
          generate_release_notes: true